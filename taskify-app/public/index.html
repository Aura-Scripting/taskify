<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - Task Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .todo-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #2ecc71;
        }

        button.add-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button.add-btn:hover {
            background-color: #27ae60;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #3498db;
        }

        .task-item.completed {
            border-left-color: #7f8c8d;
            text-decoration: line-through;
            opacity: 0.6;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-btns button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .action-btns .check-btn {
            color: #27ae60;
        }

        .action-btns .check-btn:hover {
            background-color: #d5f4e6;
        }

        .action-btns .delete-btn {
            color: #e74c3c;
        }

        .action-btns .delete-btn:hover {
            background-color: #fadbd8;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>Taskify 📝</h2>
        
        <form class="input-section" id="task-form">
            <input type="text" id="task-input" placeholder="Enter a new task..." required>
            <button type="submit" class="add-btn">Add</button>
        </form>

        <ul class="task-list" id="task-list"></ul>
    </div>

    <script>
        const taskForm = document.getElementById('task-form');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');

        // 1. When the page loads, ask the server for any saved tasks
        async function loadTasks() {
            const response = await fetch('/api/tasks');
            const tasks = await response.json();
            
            taskList.innerHTML = ''; // Clear list
            tasks.forEach(task => renderTask(task));
        }

        // Helper function to draw a task card on the screen
        function renderTask(task) {
            const li = document.createElement('li');
            li.className = 'task-item';
            if (task.completed) {
                li.classList.add('completed');
            }
            
            li.innerHTML = `
                <span>${task.text}</span>
                <div class="action-btns">
                    <button type="button" class="check-btn" title="Mark as ${task.completed ? 'incomplete' : 'complete'}">✓</button>
                    <button type="button" class="delete-btn" title="Delete task">🗑️</button>
                </div>
            `;
            
            const checkBtn = li.querySelector('.check-btn');
            const deleteBtn = li.querySelector('.delete-btn');
            
            // Check/uncheck task
            checkBtn.addEventListener('click', async function(event) {
                event.preventDefault();
                event.stopPropagation();
                const response = await fetch(`/api/tasks/${task.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !task.completed })
                });
                
                if (response.ok) {
                    const updatedTask = await response.json();
                    task.completed = updatedTask.completed;
                    li.classList.toggle('completed');
                    checkBtn.title = task.completed ? 'Mark as incomplete' : 'Mark as complete';
                }
            });
            
            // Delete task
            deleteBtn.addEventListener('click', async function(event) {
                event.preventDefault();
                event.stopPropagation();
                const response = await fetch(`/api/tasks/${task.id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    li.remove();
                }
            });
            
            taskList.appendChild(li);
        }

        // 2. When clicking "Add", send the task to the server
        taskForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            const taskText = taskInput.value;

            // Send the task to the Waiter (Server)
            const response = await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: taskText })
            });

            if (response.ok) {
                const newTask = await response.json();
                renderTask(newTask); // Draw it on screen
                taskInput.value = ''; // Clear input
            } else {
                alert("Server rejected the task!");
            }
        });

        // Load existing tasks right away when opening the page
        loadTasks();
    </script>
</body>
</html>
